<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

  #kryos-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 54px;
    height: 54px;
    background: #111112;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: transform 0.2s ease;
    border: 1.5px solid rgba(241,244,240,0.12);
  }
  #kryos-fab:hover { transform: scale(1.06); }
  #kryos-fab svg { width: 22px; height: 22px; fill: #F1F4F0; }
  #kryos-fab .badge {
    position: absolute;
    top: 0; right: 0;
    width: 14px; height: 14px;
    background: #4ade80;
    border-radius: 50%;
    border: 2px solid #fff;
  }

  #kryos-chat {
    position: fixed;
    bottom: 88px;
    right: 24px;
    width: 360px;
    height: 520px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.14);
    display: flex;
    flex-direction: column;
    z-index: 9998;
    overflow: hidden;
    opacity: 0;
    transform: translateY(16px) scale(0.97);
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  #kryos-chat.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  @media (max-width: 480px) {
    #kryos-chat {
      width: 100vw;
      height: 75vh;
      bottom: 0;
      right: 0;
      border-radius: 20px 20px 0 0;
    }
    #kryos-fab { bottom: 20px; right: 16px; }
  }
  @media (min-width: 481px) and (max-width: 768px) {
    #kryos-chat { width: 320px; height: 480px; }
  }

  .chat-header {
    background: #111112;
    padding: 13px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .header-logo {
    height: 24px;
    width: auto;
    object-fit: contain;
    object-position: left center;
    flex: 1;
  }
  .online-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 3px 9px;
  }
  .online-dot {
    width: 6px; height: 6px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .online-text { font-size: 10px; color: #9a9a9a; }
  .close-btn {
    width: 26px; height: 26px;
    background: rgba(255,255,255,0.07);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .close-btn svg { width: 10px; height: 10px; stroke: #F1F4F0; fill: none; stroke-width: 2; }

  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #fafafa;
  }
  .timestamp {
    text-align: center;
    font-size: 10px;
    color: #aaa;
    margin: 2px 0 4px;
  }
  .msg-row { display: flex; gap: 7px; align-items: flex-end; }
  .msg-row.user { flex-direction: row-reverse; }
  .bot-icon {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: #111112;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .bot-icon svg { width: 12px; height: 12px; fill: #F1F4F0; }
  .msg {
    max-width: 78%;
    padding: 9px 13px;
    font-size: 13px;
    line-height: 1.55;
  }
  .msg.bot {
    background: #fff;
    border: 0.5px solid #e8e8e8;
    border-radius: 14px 14px 14px 4px;
    color: #111112;
  }
  .msg.user {
    background: #111112;
    color: #F1F4F0;
    border-radius: 14px 14px 4px 14px;
  }
  .typing {
    background: #fff;
    border: 0.5px solid #e8e8e8;
    border-radius: 14px 14px 14px 4px;
    padding: 10px 14px;
    display: flex; gap: 4px; align-items: center;
  }
  .typing span {
    width: 5px; height: 5px;
    background: #bbb; border-radius: 50%;
    animation: tp 1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes tp {
    0%,100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-3px); opacity: 1; }
  }

  .chat-footer {
    padding: 10px 12px;
    border-top: 0.5px solid #efefef;
    background: #fff;
    flex-shrink: 0;
  }
  .input-row {
    display: flex; align-items: center; gap: 8px;
    background: #f5f5f5; border-radius: 12px; padding: 8px 10px;
  }
  #chat-input {
    flex: 1; border: none; background: transparent;
    font-size: 13px; outline: none; resize: none;
    font-family: inherit; color: #111112;
  }
  #chat-input::placeholder { color: #aaa; }
  #chat-send {
    width: 30px; height: 30px;
    background: #111112; border: none;
    border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.2s;
  }
  #chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
  #chat-send svg { width: 13px; height: 13px; fill: #F1F4F0; }
</style>
</head>
<body>

<div id="kryos-fab" onclick="toggleChat()">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
  <div class="badge"></div>
</div>

<div id="kryos-chat">
  <div class="chat-header">
    <img class="header-logo" src="https://framerusercontent.com/images/3nSXzaWpWPhp8wWlUuDtUCOzVI.png?scale-down-to=512" alt="Kryos" />
    <div class="online-pill">
      <div class="online-dot"></div>
      <span class="online-text">en línea</span>
    </div>
    <div class="close-btn" onclick="toggleChat()">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
  </div>
  <div id="chat-messages"></div>
  <div class="chat-footer">
    <div class="input-row">
      <textarea id="chat-input" placeholder="Escribe tu mensaje..." rows="1"></textarea>
      <button id="chat-send" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://kryos-system.vercel.app/api/chat';
  let messages = [];
  let isOpen = false;

  function toggleChat() {
    isOpen = !isOpen;
    document.getElementById('kryos-chat').classList.toggle('open', isOpen);
    if (isOpen && messages.length === 0) {
      const now = new Date();
      const ts = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      addTimestamp('Hoy · ' + ts);
      addMessage('bot', '¡Hola! Soy el asistente de Kryos Studio. ¿En qué puedo ayudarte hoy?');
    }
  }

  function addTimestamp(text) {
    const div = document.createElement('div');
    div.className = 'timestamp';
    div.textContent = text;
    document.getElementById('chat-messages').appendChild(div);
  }

  function addMessage(role, text) {
    const row = document.createElement('div');
    row.className = 'msg-row' + (role === 'user' ? ' user' : '');

    if (role === 'bot') {
      const icon = document.createElement('div');
      icon.className = 'bot-icon';
      icon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>';
      row.appendChild(icon);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg ' + role;
    bubble.textContent = text;
    row.appendChild(bubble);

    document.getElementById('chat-messages').appendChild(row);
    document.getElementById('chat-messages').scrollTop = 99999;
    messages.push({ role: role === 'bot' ? 'assistant' : 'user', content: text });
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.id = 'typing-row';
    const icon = document.createElement('div');
    icon.className = 'bot-icon';
    icon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>';
    const t = document.createElement('div');
    t.className = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(icon);
    row.appendChild(t);
    document.getElementById('chat-messages').appendChild(row);
    document.getElementById('chat-messages').scrollTop = 99999;
  }

  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    addMessage('user', text);
    document.getElementById('chat-send').disabled = true;
    showTyping();
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      removeTyping();
      addMessage('bot', data.reply || 'Lo siento, ha habido un error.');
    } catch {
      removeTyping();
      addMessage('bot', 'Error de conexión. Inténtalo de nuevo.');
    }
    document.getElementById('chat-send').disabled = false;
  }

  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('chat-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 80) + 'px';
  });
</script>
</body>
</html>
